appId: ${APP_ID}
tags:
  - passing
---
- evalScript: ${console.log('Connect and disconnect')}
# Connect and disconnect
- launchApp:
    permissions:
      all: allow

- runFlow: 
    file: e2e/connectReader.yaml
    env:
      discoveryMethod: "bt-scn-btn"
- runFlow: e2e/checkIfConnected.yaml

- evalScript: ${console.log('Install required update and connect')}
# Install required update and connect
- launchApp:
    permissions:
      all: allow
      
- runFlow: 
    file: e2e/connectReader.yaml
    env:
      discoveryMethod: "bt-scn-btn"
      updateRequired: true
- runFlow: e2e/checkIfConnected.yaml

- evalScript: ${console.log('Change discovery method to bluetooth proximity')}
# Change discovery method to bluetooth proximity
- launchApp:
    permissions:
      all: allow

- runFlow:
    file: e2e/connectReader.yaml
    env:
      discoveryMethod: "bt-prox-btn"
    when:
        platform: ios

- evalScript: ${console.log('Change discovery method to Internet')}
# Change discovery method to Internet
- launchApp:
    permissions:
      all: allow

- runFlow:
    file: e2e/connectReader.yaml
    env:
      discoveryMethod: "internet-btn"

# TODO ios only
# Required update impossible due to low battery

- evalScript: ${console.log('Collect card payment')}
# Collect card payment
- launchApp:
    permissions:
      all: allow

- runFlow:
    file: e2e/connectReader.yaml
    env:
      discoveryMethod: "bt-scn-btn"
- runFlow:
    file: e2e/collectPayment.yaml

- evalScript: ${console.log('Store card via SetupIntent')}
# Store card via SetupIntent
- launchApp:
    permissions:
      all: allow

- runFlow:
    file: e2e/connectReader.yaml
    env:
      discoveryMethod: "bt-scn-btn"
- runFlow:
    file: e2e/setupIntent.yaml

