appId: ${APP_ID}
---

- tapOn:
    id: "discovery-method-button"

- waitForAnimationToEnd:
    timeout: 5000

- tapOn:
    id: ${discoveryMethod}

- waitForAnimationToEnd:
    timeout: 5000

- tapOn:
    id: "discover-readers-button"

- waitForAnimationToEnd:
    timeout: 5000

- runFlow:
    when:
        true: ${updateRequired == true}
    commands:
        - tapOn:
            id: "update-plan-picker"

- waitForAnimationToEnd:
    timeout: 5000
- extendedWaitUntil:
    visible:
        id: "reader-0"
    timeout: 100000
- tapOn:
    id: "reader-0"
    
- waitForAnimationToEnd:
    timeout: 5000

- runFlow:
    when:
        true: ${updateRequired == true}
    commands:
        - extendedWaitUntil:
            visible:
                id: "required-update-in-progress"
            timeout: 300000

- waitForAnimationToEnd:
    timeout: 5000