appId: ${APP_ID}
---

- tapOn:
    id: "discovery-method-button"

- waitForAnimationToEnd:
    timeout: 5000

- tapOn:
    id: ${discoveryMethod}

- waitForAnimationToEnd:
    timeout: 5000

- tapOn:
    id: "discover-readers-button"

- waitForAnimationToEnd:
    timeout: 5000

- runFlow:
    when:
        true: ${updateRequired == true}
    commands:
        - tapOn:
            id: "update-plan-picker"

- waitForAnimationToEnd:
    timeout: 5000

- tapOn:
    id: "reader-0"
    
- waitForAnimationToEnd:
    timeout: 5000

- runFlow:
    when:
        true: ${updateRequired == true}
    commands:
        - extendedWaitUntil:
            visible:
                id: "required-update-in-progress"
            timeout: 100000

- waitForAnimationToEnd:
    timeout: 5000