appId: ${APP_ID}
---
- scrollUntilVisible:
    element:
      id: "in-person-refund-button"
- tapOn:
    id: "in-person-refund-button"

- waitForAnimationToEnd:
    timeout: 5000

- extendedWaitUntil:
    visible:
        id: "charge-id-text-field"
    timeout: 60000

- tapOn:
    id: "charge-id-text-field"
- inputText: "ch_3JxsjUBDuqlYGNW21EL8UyOm"

- tapOn:
    id: "amount-text-field"
- inputText: "20000"

- scrollUntilVisible:
    element:
      id: "collect-refund-button"
- tapOn:
    id: "collect-refund-button"

- waitForAnimationToEnd:
    timeout: 5000

- extendedWaitUntil:
    visible:
        id: "Collect"
    timeout: 300000

- scrollUntilVisible:
    element:
      id: "Failed"